<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Stock News Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div id="card" class="card">

    <!-- Decorative background grid lines -->
    <div class="bg-grid" aria-hidden="true"></div>

    <!-- Ambient glow orbs -->
    <div class="glow glow-top" aria-hidden="true"></div>
    <div class="glow glow-bottom" aria-hidden="true"></div>

    <!-- ── TOP SECTION ─────────────────────────────── -->
    <header class="top-bar">
      <div class="brand-group">
        {{LOGO_IMG}}
        <span class="brand-name">{{BRAND}}</span>
      </div>
      <span class="category-badge">{{CATEGORY}}</span>
    </header>

    <!-- Thin separator line -->
    <div class="divider" aria-hidden="true"></div>

    <!-- ── CENTER SECTION ─────────────────────────── -->
    <main class="content-area">
      <div class="headline-wrap">
        <h1 class="headline">{{HEADLINE}}</h1>
      </div>
      <p class="summary">{{SUMMARY}}</p>
    </main>

    <!-- ── BOTTOM SECTION ─────────────────────────── -->
    <div class="divider" aria-hidden="true"></div>

    <footer class="bottom-bar">
      <!-- Company + Ticker -->
      <div class="company-group">
        <span class="company-name">{{COMPANY}}</span>
        <span class="ticker-badge">{{TICKER}}</span>
      </div>

      <!-- Sentiment -->
      <div
        class="sentiment-badge"
        style="background:{{SENTIMENT_BG}};border:1px solid {{SENTIMENT_BORDER}};color:{{SENTIMENT_COLOR}};"
      >
        <span class="sentiment-icon">{{SENTIMENT_EMOJI}}</span>
        {{SENTIMENT}}
      </div>

      <!-- Source + Date -->
      <div class="meta-group">
        <span class="source">{{SOURCE}}</span>
        <span class="meta-dot" aria-hidden="true">·</span>
        <span class="pub-date">{{DATE}}</span>
      </div>
    </footer>

    <!-- Corner accent marks -->
    <div class="corner corner-tl" aria-hidden="true"></div>
    <div class="corner corner-tr" aria-hidden="true"></div>
    <div class="corner corner-bl" aria-hidden="true"></div>
    <div class="corner corner-br" aria-hidden="true"></div>

  </div>
</body>
</html>
